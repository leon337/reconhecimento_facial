<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bater Ponto</title>
</head>
<body>
  <main
    id="punch-app"
    data-submit-url="{{ url_for('punch.punch_submit') }}"
    data-csrf-token="{{ csrf_token() }}"
  >
    <h1>Bater Ponto</h1>
    <video id="video" autoplay playsinline></video>

    <label for="tipo">Tipo</label>
    <select id="tipo">
      <option value="ENTRADA">Entrada</option>
      <option value="SAIDA">Saída</option>
    </select>

    <button id="capture" type="button">Capturar e registrar</button>
    <p id="status" role="status"></p>
  </main>

  <script src="{{ url_for('static', filename='punch.js') }}" defer></script>
</body>
</html>
