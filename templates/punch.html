<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bater Ponto</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-gray-100 p-4">
  <main
    id="punch-app"
    data-submit-url="{{ url_for('punch.punch_submit') }}"
    data-challenge-url="{{ url_for('punch.punch_challenge') }}"
    data-csrf-token="{{ csrf_token() }}"
    class="mx-auto max-w-xl rounded bg-white p-5 shadow"
  >
    <h1 class="mb-2 text-2xl font-bold">Bater Ponto</h1>
    <p class="mb-4 text-sm text-gray-600">
      O sistema identifica automaticamente o funcionário. Nenhuma foto da galeria é aceita.
    </p>

    <section class="space-y-3">
      <video
        id="video"
        autoplay
        playsinline
        muted
        class="hidden w-full rounded bg-black"
        aria-label="Câmera para reconhecimento facial"
      ></video>

      <div id="challenge-panel" class="hidden rounded border border-blue-200 bg-blue-50 p-3 text-center">
        <p id="challenge-text" class="font-semibold text-blue-900"></p>
        <p id="challenge-countdown" class="mt-1 text-sm text-blue-700"></p>
      </div>

      <button
        id="start-camera"
        type="button"
        class="w-full rounded bg-green-600 px-4 py-3 font-semibold text-white hover:bg-green-700"
      >
        Abrir câmera segura
      </button>

      <button
        id="start-verification"
        type="button"
        disabled
        class="hidden w-full rounded bg-indigo-600 px-4 py-3 font-semibold text-white hover:bg-indigo-700 disabled:cursor-not-allowed disabled:opacity-50"
      >
        Iniciar prova de vida e registrar
      </button>
    </section>

    <div class="mt-5 flex items-center gap-2">
      <label for="tipo" class="font-semibold">Tipo</label>
      <select id="tipo" class="rounded border p-2">
        <option value="ENTRADA">Entrada</option>
        <option value="SAIDA">Saída</option>
      </select>
    </div>

    <div class="mt-4 rounded bg-gray-50 p-3 text-sm">
      <div class="flex justify-between">
        <span>Meta operacional</span>
        <strong>&lt; 10 segundos</strong>
      </div>
      <div class="mt-1 flex justify-between">
        <span>Tempo atual</span>
        <strong id="elapsed-time">0,0s</strong>
      </div>
    </div>

    <p id="status" role="status" aria-live="polite" class="mt-4 min-h-6 text-sm text-gray-700"></p>
  </main>

  <script src="{{ url_for('static', filename='punch.js') }}" defer></script>
</body>
</html>
