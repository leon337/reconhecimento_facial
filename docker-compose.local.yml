services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      APP_ENV: pilot
      PORT: 8000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      BIOMETRIC_STORAGE_FOLDER: /app/instance/biometrics
    depends_on:
      postgres:
        condition: service_healthy
    command: >-
      sh -c "flask --app main db upgrade &&
             python scripts/bootstrap_local.py &&
             gunicorn --bind 0.0.0.0:8000 --workers ${WEB_CONCURRENCY:-2} --timeout 30 main:app"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - biometric_local:/app/instance/biometrics
      - ./instance/certs:/app/instance/certs:ro
    networks:
      - local_internal

  https-proxy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - app
    environment:
      LAN_IP: ${LAN_IP:-127.0.0.1}
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - ./Caddyfile.local:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - local_internal

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_local:/var/lib/postgresql/data
    networks:
      - local_internal

networks:
  local_internal:
    driver: bridge

volumes:
  postgres_local:
  biometric_local:
  caddy_data:
  caddy_config:
