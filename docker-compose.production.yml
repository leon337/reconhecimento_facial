services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - biometric_data:/app/instance/biometrics
    expose:
      - "5000"
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  backup:
    build: .
    restart: "no"
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "scripts/backup_postgres.py"]
    volumes:
      - backup_data:/var/backups/controle-ponto
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  biometric_data:
  backup_data:
